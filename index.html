!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Game Library</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>
<body>
  <header class="top-bar">
    <h1>Game Library</h1>
  </header>

  <section class="search-bar">
    <input id="search" placeholder="Search games, consoles, developers, publishers..." />
    <button id="toggleFilters" type="button">Categories ▾</button>
  </section>

  <section id="advancedFilters" class="advanced-filters" hidden>
    <select id="consoleFilter"><option value="all">All Consoles</option></select>
    <select id="yearFilter"><option value="all">All Years</option></select>
    <select id="regionFilter"><option value="all">All Regions</option></select>
    <select id="companyFilter"><option value="all">All Companies</option></select>
    <select id="sortFilter">
      <option value="title_asc">Title A–Z</option>
      <option value="title_desc">Title Z–A</option>
      <option value="year_desc">Year New → Old</option>
      <option value="year_asc">Year Old → New</option>
    </select>
  </section>

  <p id="resultsMeta" class="results-meta"></p>
  <div id="grid"></div>

  <script src="app.js"></script>
</body>
</html>
